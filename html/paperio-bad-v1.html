<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paper.io - Circular Arena</title>
    <style>
        body { 
            margin: 0; background: #111; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden; 
            font-family: sans-serif; color: white;
        }
        canvas { background: #1a1a1a; box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 50%; border: 8px solid #333; }
        #scoreboard {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 10px; min-width: 150px;
        }
        .score-entry { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold;}
        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #restart-btn {
            padding: 15px 40px; font-size: 1.5rem; background: #3498db; color: white;
            border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="scoreboard">
        <h3 style="margin:0 0 10px 0; color: #3498db;">Leaderboard</h3>
        <div id="score-list"></div>
    </div>

    <div id="death-screen">
        <h1 style="color: #e74c3c; font-size: 3rem;">ELIMINATED</h1>
        <button id="restart-btn">RE-ENTER ARENA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/** * TUNING */
const CONFIG = {
    ARENA_SIZE: 800,    // Pixel size of the circular arena
    GRID_COUNT: 100,    // Resolution (100x100)
    TICK_RATE: 120,      // Speed (lower = faster)
    BOT_COUNT: 1,       // More bots for a bigger arena
    BOT_TURN_CHANCE: 0.04
};

const TILE_SIZE = CONFIG.ARENA_SIZE / CONFIG.GRID_COUNT;
const CENTER = CONFIG.GRID_COUNT / 2;
const RADIUS = CONFIG.GRID_COUNT / 2 - 1;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.ARENA_SIZE;
canvas.height = CONFIG.ARENA_SIZE;

let gameActive = true;
let grid = Array(CONFIG.GRID_COUNT).fill().map(() => Array(CONFIG.GRID_COUNT).fill(0));

class Agent {
    constructor(id, color, isBot = true) {
        this.id = id;
        this.color = color;
        this.isBot = isBot;
        this.isDead = false;
        this.score = 0;
        this.trailId = id + 20;
        this.dx = 1;
        this.dy = 0;
        this.spawnRandomly();
        this.initBase();
    }

    spawnRandomly() {
        // Find a random spot inside the circle
        let angle = Math.random() * Math.PI * 2;
        let dist = Math.random() * (RADIUS * 0.7); // Spawn within 70% of radius
        this.x = Math.floor(CENTER + Math.cos(angle) * dist);
        this.y = Math.floor(CENTER + Math.sin(angle) * dist);
        
        // Random initial direction
        const dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
        let d = dirs[Math.floor(Math.random() * 4)];
        this.dx = d.x; this.dy = d.y;
    }

    initBase() {
        for(let i = -1; i <= 1; i++) {
            for(let j = -1; j <= 1; j++) {
                let nx = this.x + i, ny = this.y + j;
                if(this.isInsideCircle(nx, ny)) grid[nx][ny] = this.id;
            }
        }
    }

    isInsideCircle(x, y) {
        let dist = Math.sqrt(Math.pow(x - CENTER, 2) + Math.pow(y - CENTER, 2));
        return dist < RADIUS;
    }

    update() {
        if (this.isDead) return;
        if (this.isBot) this.decideDirection();

        let nextX = this.x + this.dx;
        let nextY = this.y + this.dy;

        // Check Circular Wall
        if (!this.isInsideCircle(nextX, nextY)) return this.die();

        let target = grid[nextX][nextY];

        // Collision: If you hit a trail
        if (target > 20) {
            const victimId = target - 20;
            const victim = agents.find(a => a.id === victimId);
            if (victim) victim.die();
            if (this.isDead) return; 
        }

        if (target !== this.id) {
            grid[nextX][nextY] = this.trailId;
        } else if (this.hasTrail()) {
            this.capture();
        }

        this.x = nextX; this.y = nextY;
    }

    hasTrail() {
        for(let i=0; i<CONFIG.GRID_COUNT; i++) {
            for(let j=0; j<CONFIG.GRID_COUNT; j++) if(grid[i][j] === this.trailId) return true;
        }
        return false;
    }

    decideDirection() {
        if (Math.random() < CONFIG.BOT_TURN_CHANCE || !this.isInsideCircle(this.x + this.dx, this.y + this.dy)) {
            const dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
            const valid = dirs.filter(d => 
                !(d.x === -this.dx && d.y === -this.dy) && 
                this.isInsideCircle(this.x + d.x, this.y + d.y)
            );
            if (valid.length > 0) {
                const chosen = valid[Math.floor(Math.random() * valid.length)];
                this.dx = chosen.x; this.dy = chosen.y;
            }
        }
    }

    capture() {
        for (let i = 0; i < CONFIG.GRID_COUNT; i++) {
            for (let j = 0; j < CONFIG.GRID_COUNT; j++) {
                if (grid[i][j] === this.trailId) grid[i][j] = this.id;
            }
        }
        // Basic horizontal scan-fill
        for (let j = 0; j < CONFIG.GRID_COUNT; j++) {
            let row = [];
            for(let i=0; i < CONFIG.GRID_COUNT; i++) if(grid[i][j] === this.id) row.push(i);
            if(row.length >= 2) {
                for(let i = row[0]; i <= row[row.length-1]; i++) {
                    if(this.isInsideCircle(i, j)) grid[i][j] = this.id;
                }
            }
        }
        this.updateScore();
    }

    updateScore() {
        let count = 0;
        for(let i=0; i<CONFIG.GRID_COUNT; i++) {
            for(let j=0; j<CONFIG.GRID_COUNT; j++) if(grid[i][j] === this.id) count++;
        }
        this.score = ((count / (Math.PI * Math.pow(RADIUS, 2))) * 100).toFixed(1);
    }

    die() {
        this.isDead = true;
        for (let i = 0; i < CONFIG.GRID_COUNT; i++) {
            for (let j = 0; j < CONFIG.GRID_COUNT; j++) {
                if (grid[i][j] === this.id || grid[i][j] === this.trailId) grid[i][j] = 0;
            }
        }
        if (!this.isBot) {
            gameActive = false;
            document.getElementById('death-screen').style.display = 'flex';
        }
    }
}

// SETUP AGENTS
const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c', '#ecf0f1', '#95a5a6'];
const agents = [new Agent(1, colors[0], false)];
for(let i=0; i < CONFIG.BOT_COUNT; i++) {
    agents.push(new Agent(i+2, colors[(i+1) % colors.length]));
}

document.getElementById('restart-btn').onclick = () => location.reload();

window.addEventListener('keydown', e => {
    const h = agents[0]; if(h.isDead) return;
    const key = e.key.toLowerCase();
    if ((key === 'w' || key === 'arrowup') && h.dy === 0) { h.dx = 0; h.dy = -1; }
    if ((key === 's' || key === 'arrowdown') && h.dy === 0) { h.dx = 0; h.dy = 1; }
    if ((key === 'a' || key === 'arrowleft') && h.dx === 0) { h.dx = -1; h.dy = 0; }
    if ((key === 'd' || key === 'arrowright') && h.dx === 0) { h.dx = 1; h.dy = 0; }
});

function draw() {
    ctx.clearRect(0, 0, CONFIG.ARENA_SIZE, CONFIG.ARENA_SIZE);

    for (let i = 0; i < CONFIG.GRID_COUNT; i++) {
        for (let j = 0; j < CONFIG.GRID_COUNT; j++) {
            let val = grid[i][j];
            if (val !== 0) {
                let isTrail = val > 20;
                let id = isTrail ? val - 20 : val;
                let agent = agents.find(a => a.id === id);
                if (agent) {
                    ctx.fillStyle = agent.color;
                    ctx.globalAlpha = isTrail ? 0.4 : 1.0;
                    ctx.fillRect(i * TILE_SIZE, j * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }
    }
    ctx.globalAlpha = 1.0;
    agents.forEach(a => {
        if (!a.isDead) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(a.x * TILE_SIZE, a.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    });

    document.getElementById('score-list').innerHTML = agents
        .filter(a => !a.isDead)
        .sort((a,b) => b.score - a.score)
        .map(a => `<div class="score-entry" style="color:${a.color}"><span>${a.isBot ? 'Bot' : 'YOU'}</span><span>${a.score}%</span></div>`).join('');
}

function loop() {
    if (!gameActive) return;
    agents.forEach(a => a.update());
    draw();
    setTimeout(loop, CONFIG.TICK_RATE);
}
loop();
</script>
</body>
</html>

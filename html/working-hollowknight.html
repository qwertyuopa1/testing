class Flags {

              constructor(url, terms) {

                             this.url = url;

                             this.matched = {};

 

                             this.terms = [];

                             terms.forEach((term) => {

                                           let s = term.replace(/[\]{}?^$().*\\+|[]/g, '\\$&');

                                           s = s.replace(/\\\*/g, '.*');

                                           s = s.replace(/\\\?/g, '.');

                                           let regex = new RegExp('\\b' + s + '\\b', 'gi');

                                           this.terms.push({term: term, regex: regex});

                             });

              report(flags) {

        console.debug('[LS Filter] flag report');

                             if (!flags.length)

                             const xhr = new XMLHttpRequest();

                             xhr.open('POST', document.location.origin + '/772ff609488b2c9bb6bb2871cac430715c14f39e1462bea30062462d694cfd9a/log_flag', true);

                             xhr.send(JSON.stringify({

                                           url: this.url.href,

                                           flags: flags,

                                           at_epoch_ms: Date.now()

                             }));

              }

 

              matchTerms(input, flagAll) {

                             const matches = [];

                             this.terms.forEach((term) => {

                                           const hits = input.match(term.regex);

                                           if (!hits || !hits.length)

                                                          return;

 

                                           let added = false;

                                           if (typeof(this.matched[term.term]) === 'undefined')

                                                          added = true

 

                                           let count = hits.length;

                                           if (!added)

                                                          count -= this.matched[term.term];

 

                                           this.matched[term.term] = hits.length;

 

                                           if (added || flagAll)

                                                          matches.push([term.term, count]);

                             });

                             return matches;

              }

 

              scanIntentValue(value) {

                             const changes = [];

                                           match[2] = true; // mark as user entered

                                           changes.push(match);

                             });

 

                             if (changes.length)

                                           this.report(changes);

              }

 

              scanIntentValues(values) {

                             values.forEach((value) => {

                                           this.scanIntentValue(value);

                             });

              }

 

              scanIntentEvent(event) {

                             switch (event.target.tagName.toLowerCase()) {

                             case 'input':

                                           let type = event.target.type || 'text';

function checkCurrentSite(yt, url) {

  const xhr = new XMLHttpRequest();

  const body = JSON.stringify({

    url: url || window.location.href,

    youtube: yt

  });

  console.log('[LS Filter] reporting ->', body);

  const checkUrl = document.location.origin + '/772ff609488b2c9bb6bb2871cac430715c14f39e1462bea30062462d694cfd9a/log';

  xhr.open('POST', checkUrl, true);

  xhr.send(body);

      console.log('[LS Filter] score ->', score.allow);

      if (score.redirect) {

        hardBlock();

      }

    }

  };

}

    <script>

        const DB_NAME = "cachedb";

        const STORE_NAME = "files";

 

        function openCacheDB() {

            return new Promise((resolve, reject) => {

                const req = indexedDB.open(DB_NAME, 1);

 

                req.onupgradeneeded = () => {

                    const db = req.result;

                    if (!db.objectStoreNames.contains(STORE_NAME)) {

                        db.createObjectStore(STORE_NAME);

                    }

                };

 

                req.onsuccess = () => resolve(req.result);

                req.onerror = () => reject(req.error);

            });

        }

 

        async function saveToCache(key, blob) {

            const db = await openCacheDB();

            return new Promise((resolve, reject) => {

                const tx = db.transaction(STORE_NAME, "readwrite");

                tx.objectStore(STORE_NAME).put(blob, key);

                tx.oncomplete = () => resolve();

                tx.onerror = () => reject(tx.error);

            });

        }

 

        async function loadFromCache(key) {

            const db = await openCacheDB();

            return new Promise((resolve, reject) => {

                const tx = db.transaction(STORE_NAME, "readonly");

                const req = tx.objectStore(STORE_NAME).get(key);

                req.onsuccess = () => resolve(req.result || null);

                req.onerror = () => reject(req.error);

            });

        }

 

        async function deleteFromCache(key) {

            const db = await openCacheDB();

            return new Promise((resolve, reject) => {

                const tx = db.transaction(STORE_NAME, "readwrite");

                tx.objectStore(STORE_NAME).delete(key);

                tx.oncomplete = () => resolve();

                tx.onerror = () => reject(tx.error);

            });

        }

        var loadingText = document.querySelector("#loading-text");

        async function fetchWithProgress(url) {

            const response = await fetch(url);

            const reader = response.body.getReader();

            let chunks = [];

            let received = 0;

            while (true) {

                const {

                    done,

                    value

                } = await reader.read();

                if (done) break;

                received += value.length;

                loadedBytes += value.length;

                chunks.push(value);

                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);

                let mbTotal = '912.81';

                loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;

            }

            let fullBuffer = new Uint8Array(received);

            let offset = 0;

            for (let chunk of chunks) {

                fullBuffer.set(chunk, offset);

                offset += chunk.length;

            }

            return fullBuffer.buffer;

        }

        async function mergeFiles(fileParts, cacheKey) {

            );

            const mergedBlob = new Blob(buffers);

            await saveToCache(cacheKey, mergedBlob);

            return URL.createObjectURL(mergedBlob);

        }
